# nginx site template — pbx3sbc-admin with Let’s Encrypt HTTPS
#
# Install on SBC:
#   sudo cp deploy/nginx-pbx3sbc-admin.conf /etc/nginx/sites-available/pbx3sbc-admin
#   sudo ln -sfn /etc/nginx/sites-available/pbx3sbc-admin /etc/nginx/sites-enabled/pbx3sbc-admin
#   # Adjust root / php-fpm socket if paths differ
#   sudo nginx -t && sudo systemctl reload nginx
#
# Issue cert first (see pbx3sbc/workingdocs/LE_HTTPS_SBC_ADMIN.md):
#   sudo certbot certonly --webroot -w /home/ubuntu/pbx3sbc-admin/public -d sbc.pbx3.com ...
#
# Requires: /etc/letsencrypt/options-ssl-nginx.conf and ssl-dhparams.pem (certbot or openssl dhparam)

# pbx3sbc-admin — HTTP ACME + redirect to HTTPS
# Fleet warm-sync hits member public IPs over HTTP (/api/* must not redirect).
server {
    listen 80;
    listen [::]:80;
    server_name sbc.pbx3.com;

    root /home/ubuntu/pbx3sbc-admin/public;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        try_files $uri =404;
    }

    # Gatekeeper → standby/active by public IP (no VIP LE cert on sticky IP)
    location ^~ /api/ {
        try_files $uri /index.php?$query_string;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# pbx3sbc-admin — HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sbc.pbx3.com;

    root /home/ubuntu/pbx3sbc-admin/public;

    ssl_certificate     /etc/letsencrypt/live/sbc.pbx3.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sbc.pbx3.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    index index.php;
    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param HTTPS on;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
